name: squirrel
description: "Bilibili video monitor and auto-downloader"
publish_to: 'none'

version: 0.2.4+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.0.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.0
  qr_flutter: ^4.1.0
  xml: ^6.5.0
  provider: ^6.1.0
  cached_network_image: ^3.3.0
  crypto: ^3.0.0
  file_picker: ^10.3.10
  open_filex: ^4.5.0
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

