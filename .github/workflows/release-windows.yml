name: Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Build Windows (Release)
        run: flutter build windows --release

      - name: Create release archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $src = "build\windows\x64\runner\Release"
          $zip = "BiCone-${version}-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $zip

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          iscc /DMyAppVersion=$version installer\windows\setup.iss

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $tag = "${{ github.ref_name }}"
          gh release upload $tag `
            "BiCone-${version}-windows-x64.zip" `
            "installer/windows/BiCone-${version}-windows-x64-setup.exe" `
            --repo ${{ github.repository }} --clobber
