name: Sync Release to Gitee

on:
  workflow_run:
    workflows: ["Android Release", "Windows Release"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: sync-gitee-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    env:
      ALL_DONE: 'false'
      RELEASE_TAG: ''

    steps:
      - name: Wait for all release workflows
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const workflowFiles = ['prepare-release.yml', 'release-android.yml', 'release-windows.yml'];

            for (const file of workflowFiles) {
              const { data: { workflow_runs: runs } } =
                await github.rest.actions.listWorkflowRuns({
                  owner,
                  repo,
                  workflow_id: file,
                  head_sha: headSha,
                  status: 'completed',
                  per_page: 1,
                });

              if (!runs.length || runs[0].conclusion !== 'success') {
                core.info(`${file} not yet successful, skipping sync`);
                return;
              }
            }

            core.exportVariable('ALL_DONE', 'true');
            core.exportVariable('RELEASE_TAG', context.payload.workflow_run.head_branch);

      - name: Sync GitHub Repo to Gitee
        if: env.ALL_DONE == 'true'
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_RSA_PRIVATE_KEY }}
        with:
          source-repo: git@github.com:${{ github.repository }}.git
          destination-repo: git@gitee.com:it-bill/BiCone.git

      - name: Wait for IPA on GitHub Release
        if: env.ALL_DONE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG}"
          VERSION="${TAG#v}"
          IPA_NAME="BiCone-${VERSION}-unsigned.ipa"

          echo "Waiting for ${IPA_NAME} on release ${TAG}..."
          for i in $(seq 1 10); do
            if gh api "repos/${GH_REPO}/releases/tags/${TAG}" --jq '.assets[].name' | grep -Fxq "$IPA_NAME"; then
              echo "IPA found on release!"
              exit 0
            fi
            echo "IPA not found yet, retrying in 30s... ($i/10)"
            sleep 30
          done

          echo "Warning: IPA not found after 5 minutes, syncing without it"

      - name: Force sync current tag release to Gitee
        if: env.ALL_DONE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_OWNER: IT-Bill
          GITEE_REPO: BiCone
        shell: bash
        run: |
          set -euo pipefail

          TAG="${RELEASE_TAG}"
          WORKDIR="$(mktemp -d)"
          ASSET_DIR="${WORKDIR}/assets"
          mkdir -p "${ASSET_DIR}"

          echo "Fetching GitHub release for tag ${TAG}..."
          gh api "repos/${GH_REPO}/releases/tags/${TAG}" > "${WORKDIR}/github_release.json"

          python3 - <<'PY' "${WORKDIR}/github_release.json" "${WORKDIR}"
          import json, sys, pathlib

          data = json.load(open(sys.argv[1], encoding='utf-8'))
          wd = pathlib.Path(sys.argv[2])

          (wd / "name.txt").write_text((data.get("name") or data["tag_name"]) + "\n", encoding="utf-8")
          (wd / "body.txt").write_text((data.get("body") or "-"), encoding="utf-8")
          (wd / "target_commitish.txt").write_text((data.get("target_commitish") or "master") + "\n", encoding="utf-8")

          with open(wd / "assets.txt", "w", encoding="utf-8") as f:
              for asset in data.get("assets", []):
                  f.write(asset["name"] + "\n")
          PY

          NAME="$(tr -d '\n' < "${WORKDIR}/name.txt")"
          TARGET_COMMITISH="$(tr -d '\n' < "${WORKDIR}/target_commitish.txt")"

          echo "GitHub release name: ${NAME}"
          echo "GitHub target_commitish: ${TARGET_COMMITISH}"

          echo "Checking whether Gitee release ${TAG} already exists..."
          HTTP_CODE="$(curl -sS \
            -o "${WORKDIR}/gitee_release.json" \
            -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")"

          echo "Gitee query HTTP status: ${HTTP_CODE}"
          echo "Gitee query response:"
          cat "${WORKDIR}/gitee_release.json"
          echo

          RELEASE_ID="$(
          python3 - <<'PY' "${WORKDIR}/gitee_release.json"
          import json, sys

          try:
              data = json.load(open(sys.argv[1], encoding='utf-8'))
          except Exception:
              print("")
              raise

          if isinstance(data, dict) and data.get("id"):
              print(data["id"])
          else:
              print("")
          PY
          )"

          if [ "${HTTP_CODE}" = "200" ] && [ -n "${RELEASE_ID}" ]; then
            echo "Existing Gitee release found: ${RELEASE_ID}, deleting it first..."
            curl -sS --fail -X DELETE \
              "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${RELEASE_ID}?access_token=${GITEE_TOKEN}" \
              >/dev/null
            for i in $(seq 1 10); do
              CHECK_CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
                "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")"
              if [ "${CHECK_CODE}" = "404" ]; then
                echo "Confirmed old release is gone."
                break
              fi
              echo "Waiting Gitee release deletion to settle... ($i/10)"
              sleep 3
            done
          elif [ "${HTTP_CODE}" = "200" ] && [ -z "${RELEASE_ID}" ]; then
            echo "Gitee returned 200 but no valid release object for tag ${TAG}; treating as not found."
          elif [ "${HTTP_CODE}" = "404" ]; then
            echo "Gitee release ${TAG} does not exist yet."
          else
            echo "Unexpected response from Gitee when querying release by tag."
            exit 1
          fi

          echo "Creating fresh Gitee release for ${TAG}..."
          CREATE_HTTP_CODE="$(curl -sS \
            -o "${WORKDIR}/created_release.json" \
            -w "%{http_code}" \
            -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases" \
            --data-urlencode "access_token=${GITEE_TOKEN}" \
            --data-urlencode "tag_name=${TAG}" \
            --data-urlencode "name=${NAME}" \
            --data-urlencode "body@${WORKDIR}/body.txt" \
            --data-urlencode "target_commitish=${TARGET_COMMITISH}")"

          echo "Gitee create HTTP status: ${CREATE_HTTP_CODE}"
          echo "Gitee create response:"
          cat "${WORKDIR}/created_release.json"
          echo

          NEW_RELEASE_ID="$(
          python3 - <<'PY' "${WORKDIR}/created_release.json"
          import json, sys

          data = json.load(open(sys.argv[1], encoding='utf-8'))
          if isinstance(data, dict) and data.get("id"):
              print(data["id"])
          else:
              print("")
          PY
          )"

          if [ -z "${NEW_RELEASE_ID}" ]; then
            echo "Failed to create Gitee release for ${TAG}"
            exit 1
          fi

          echo "Created Gitee release id: ${NEW_RELEASE_ID}"

          if [ ! -s "${WORKDIR}/assets.txt" ]; then
            echo "No assets found on GitHub release ${TAG}, done."
            exit 0
          fi

          echo "Downloading and uploading assets for ${TAG} only..."
          while IFS= read -r asset; do
            [ -n "${asset}" ] || continue

            echo "Downloading ${asset} ..."
            rm -f "${ASSET_DIR}/${asset}"
            gh release download "${TAG}" --pattern "${asset}" --dir "${ASSET_DIR}"

            echo "Uploading ${asset} ..."
            curl -sS --fail \
              -X POST "https://gitee.com/api/v5/repos/${GITEE_OWNER}/${GITEE_REPO}/releases/${NEW_RELEASE_ID}/attach_files" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${ASSET_DIR}/${asset}" \
              >/dev/null
          done < "${WORKDIR}/assets.txt"

          echo "Release ${TAG} synced to Gitee successfully."