name: Sync Release to Gitee

on:
  workflow_run:
    workflows: ["Android Release", "Windows Release"]
    types: [completed]

permissions:
  contents: read

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Wait for all release workflows
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.payload.workflow_run.head_sha;

            const workflowFiles = ['release-android.yml', 'release-windows.yml'];
            for (const file of workflowFiles) {
              const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: file,
                head_sha: headSha,
                status: 'completed',
                per_page: 1,
              });
              if (!runs.length || runs[0].conclusion !== 'success') {
                core.info(`${file} not yet successful, skipping sync`);
                return;
              }
            }
            core.exportVariable('ALL_DONE', 'true');

      - name: Sync GitHub Release to Gitee
        if: env.ALL_DONE == 'true'
        uses: trustedinster/sync-release-gitee@v1.3
        with:
          gitee_owner: IT-Bill
          gitee_repo: BiCone
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          github_owner: IT-Bill
          github_repo: BiCone
          gitee_upload_retry_times: 3
