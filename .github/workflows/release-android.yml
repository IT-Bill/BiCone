name: Android Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Flutter pub get
        run: flutter pub get

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build split APKs (Release)
        run: flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64

      - name: Rename APKs
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_DIR="build/app/outputs/flutter-apk"
          mv "$APK_DIR/app-arm64-v8a-release.apk"    "$APK_DIR/BiCone-${VERSION}-arm64-v8a.apk"
          mv "$APK_DIR/app-armeabi-v7a-release.apk"   "$APK_DIR/BiCone-${VERSION}-armeabi-v7a.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/flutter-apk/BiCone-*-arm64-v8a.apk
            build/app/outputs/flutter-apk/BiCone-*-armeabi-v7a.apk
