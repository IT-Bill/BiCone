workflows:
  ios-build:
    name: iOS Build (no codesign)
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - tag
      branch_patterns:
        - pattern: 'main'
          include: true
      tag_patterns:
        - pattern: '*'
          include: true

    environment:
      flutter: stable
      groups:
        - github_credentials
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign
      - name: Convert .app to .ipa
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          VERSION=$(echo "$CM_TAG" | sed 's/^v//')
          zip -r "BiCone-${VERSION}-unsigned.ipa" Payload
    artifacts:
      - build/ios/iphoneos/BiCone-*-unsigned.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      scripts:
        - name: Upload IPA to GitHub Release
          script: |
            TAG="$CM_TAG"
            VERSION=$(echo "$TAG" | sed 's/^v//')
            IPA="build/ios/iphoneos/BiCone-${VERSION}-unsigned.ipa"
            gh release upload "$TAG" "$IPA" --repo IT-Bill/BiCone --clobber
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
